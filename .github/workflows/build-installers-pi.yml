name: Build Installer (Raspberry Pi 5 ARM64)

on:
  workflow_dispatch:

env:
  PROJECT_PATH: .
  APP_VERSION: 1.0.0

jobs:
  build-arm64:
    name: Build Raspberry Pi 5 ARM64 DEB
    runs-on: ubuntu-22.04-arm

    steps:

    - name: Checkout sources
      uses: actions/checkout@v4

    - name: Setup Temurin JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        architecture: aarch64
        cache: maven

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-0 \
          libfreetype6 \
          libgl1-mesa-dri \
          libasound2 \
          libwebkit2gtk-4.1-0 \
          libpcsclite1

    - name: Build JAR + Runtime
      working-directory: ${{ env.PROJECT_PATH }}
      run: |
        chmod +x mvnw || true

        echo "🚀 Building project...."
        ./mvnw -B -DskipTests -Djavafx.platform=linux clean package

        echo "📦 Target contents:"
        ls -lh target

        # ✅ Get fat jar
        JAR_NAME=$(ls target/Scamusica-*.jar | grep -v original | head -1 | xargs -r basename)

        if [ -z "$JAR_NAME" ]; then
          echo "❌ JAR not found!"
          exit 1
        fi

        echo "✅ Using JAR: $JAR_NAME"
        echo "JAR_NAME=$JAR_NAME" >> $GITHUB_ENV

        # ✅ Clean runtime if exists
        rm -rf target/scamusica-runtime

        JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
        JFX_PATH="./openjfx-21_linux-aarch64_bin-sdk/javafx-sdk-21/lib"

        if [ ! -d "$JFX_PATH" ]; then
          echo "❌ JavaFX SDK not found!"
          exit 1
        fi

        echo "📦 Creating runtime..."
        jlink \
          --module-path "$JAVA_HOME/jmods:$JFX_PATH" \
          --add-modules javafx.controls,javafx.fxml,javafx.media,javafx.graphics,javafx.base,java.desktop,java.logging,java.net.http,jdk.crypto.ec \
          --output target/scamusica-runtime \
          --strip-debug \
          --no-man-pages \
          --no-header-files \
          --compress=2

        # ✅ Copy native libs (VERY IMPORTANT)
        cp $JFX_PATH/*.so target/scamusica-runtime/lib/

        echo "🔎 Verify runtime:"
        find target/scamusica-runtime -name "libprism*"

    - name: Import SSL certificates
      run: |
        KEYTOOL=target/scamusica-runtime/bin/keytool
        CACERTS=target/scamusica-runtime/lib/security/cacerts
        STOREPASS=changeit

        echo "🧹 Cleaning old certs..."
        $KEYTOOL -delete -alias cis-root -keystore $CACERTS -storepass $STOREPASS || true
        $KEYTOOL -delete -alias new-cert-1 -keystore $CACERTS -storepass $STOREPASS || true
        $KEYTOOL -delete -alias new-cert-2 -keystore $CACERTS -storepass $STOREPASS || true

        echo "📥 Importing certs..."

        $KEYTOOL -importcert -alias cis-root \
          -file "certs/ca 9.crt" \
          -keystore $CACERTS -storepass $STOREPASS -noprompt

        $KEYTOOL -importcert -alias new-cert-1 \
          -file "certs/ca-10.crt" \
          -keystore $CACERTS -storepass $STOREPASS -noprompt

        $KEYTOOL -importcert -alias new-cert-2 \
          -file "certs/Fortinet_CA_SSLProxy_new-7.cer" \
          -keystore $CACERTS -storepass $STOREPASS -noprompt

        echo "✅ Certificates imported"

    - name: Verify certificates
      run: |
        keytool -list \
          -keystore target/scamusica-runtime/lib/security/cacerts \
          -storepass changeit | grep -E "cis-root|new-cert-1|new-cert-2"

    - name: Install VLC
      run: |
        sudo apt-get update
        sudo apt-get install -y vlc

    - name: Prepare jpackage input
      run: |
        mkdir -p target/jpackage-input
        cp target/$JAR_NAME target/jpackage-input/

    - name: Copy VLC libs
      run: |
        mkdir -p target/jpackage-input/lib/vlc
             
        echo "🔍 Detecting VLC paths..."
             
        VLC_LIB=$(ldconfig -p | grep libvlc.so | head -1 | awk '{print $NF}')
        VLC_CORE=$(ldconfig -p | grep libvlccore.so | head -1 | awk '{print $NF}')
             
        if [ -z "$VLC_LIB" ] || [ -z "$VLC_CORE" ]; then
        echo "❌ VLC libs not found!"
        exit 1
        fi
             
        echo "✅ libvlc: $VLC_LIB"
        echo "✅ libvlccore: $VLC_CORE"
             
        cp "$VLC_LIB" target/jpackage-input/lib/vlc/
        cp "$VLC_CORE" target/jpackage-input/lib/vlc/
             
        # plugins path detect
        VLC_PLUGIN_DIR=$(dirname $VLC_LIB)/vlc/plugins
             
        if [ ! -d "$VLC_PLUGIN_DIR" ]; then
        echo "❌ VLC plugins not found!"
        exit 1
        fi
             
        echo "✅ plugins: $VLC_PLUGIN_DIR"
             
        cp -r $VLC_PLUGIN_DIR target/jpackage-input/lib/vlc/

    - name: Verify VLC bundle
      run: |
        echo "🔎 Checking VLC files..."
        ls -lh target/jpackage-input/lib/vlc
        ls -lh target/jpackage-input/lib/vlc/plugins | head

    - name: Package into DEB
      working-directory: ${{ env.PROJECT_PATH }}
      run: |
        echo "📦 Input folder:"
        ls -lh target/jpackage-input

        echo "📦 Creating DEB..."

        jpackage \
          --type deb \
          --dest target \
          --name Scamusica \
          --input target/jpackage-input \
          --main-jar "$JAR_NAME" \
          --main-class com.musicplayer.scamusica.Main \
          --runtime-image target/scamusica-runtime \
          --linux-shortcut \
          --linux-menu-group Audio \
          --linux-package-deps "libgtk-3-0,libglib2.0-0,libasound2,libpng16-16,libjpeg62-turbo,libpcre2-8-0,libx11-6,libxext6,libxrender1,libxtst6,libxi6" \
          --java-options "-Xmx1536m -XX:+UseG1GC -XX:MaxHeapFreeRatio=30 -XX:MinHeapFreeRatio=10 -Djna.library.path=\$APPDIR/lib/vlc -DVLC_PLUGIN_PATH=\$APPDIR/lib/vlc/plugins" \
          --verbose

    - name: Verify package architecture
      run: |
        dpkg-deb --info target/*.deb | grep Architecture

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: scamusica-rpi5-arm64
        path: target/*.deb
        retention-days: 30
        # new
